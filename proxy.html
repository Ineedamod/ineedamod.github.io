<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UPLINK_STREAMS | VenHub</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: monospace; }
        #nav-bar { 
            position: fixed; top: 0; width: 100%; background: #111; color: #fff; 
            padding: 10px; display: flex; gap: 10px; z-index: 100; border-bottom: 2px solid #bc13fe;
        }
        input { flex: 1; background: #000; border: 1px solid #444; color: #0f0; padding: 5px; outline: none; }
        button { background: #bc13fe; border: none; color: #fff; cursor: pointer; padding: 5px 15px; font-weight: bold; }
        iframe { width: 100%; height: calc(100% - 45px); margin-top: 45px; border: none; }
    </style>
</head>
<body>
    <div id="nav-bar">
        <span>[PROXY_ACTIVE]</span>
        <input type="text" id="urlInput" placeholder="ENTER_UPLINK_URL (https://...)">
        <button onclick="launch()">INJECT</button>
        <button onclick="location.href='index.html'" style="background:#444">EXIT</button>
    </div>
    <iframe id="view" src="about:blank"></iframe>

    <script>
        // Auto-inject Bypass Logic
        function launch() {
            let url = document.getElementById('urlInput').value;
            if (!url.startsWith('http')) url = 'https://' + url;
            
            const frame = document.getElementById('view');
            
            // Securly/GoGuardian Redirect Trap
            window.onbeforeunload = () => "Navigation Blocked by VenHub Proxy.";
            
            frame.src = url;
            console.log("Stream Injected: " + url);
        }

        // Enter key listener
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') launch();
        });
    </script>
</body>
</html>
