<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VenHub | Golden Age 1999 V4.0</title>
    <style>
        :root { --gold: #d4af37; --deep-gold: #aa8811; --bg: #0a0a0a; --status: #00ff41; }
        body { background: var(--bg); color: var(--gold); font-family: 'Georgia', serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .status-bar { position: fixed; top: 20px; right: 20px; display: flex; align-items: center; gap: 8px; font-family: monospace; font-size: 10px; z-index: 1000; }
        .dot { width: 8px; height: 8px; background: var(--status); border-radius: 50%; box-shadow: 0 0 10px var(--status); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        header { text-align: center; padding: 40px; border-bottom: 2px solid var(--gold); width: 85%; margin-bottom: 30px; }
        h1 { font-size: 42px; letter-spacing: 5px; margin: 0; text-transform: uppercase; text-shadow: 2px 2px #000, 4px 4px var(--deep-gold); }
        .section-title { width: 85%; margin: 30px 0 15px; font-size: 18px; font-weight: 900; color: #000; background: var(--gold); padding: 5px 15px; letter-spacing: 2px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; width: 90%; max-width: 1400px; padding-bottom: 100px; }
        .button { background: #000; border: 1px solid var(--gold); padding: 25px; text-align: center; text-decoration: none; color: var(--gold); font-weight: bold; transition: 0.3s; }
        .button:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); transform: scale(1.03); }
        .desc { display: block; font-size: 9px; margin-top: 8px; opacity: 0.6; font-weight: normal; }
        .nav-footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--gold); padding: 15px; text-align: center; z-index: 100; }
        .back-link { color: var(--gold); text-decoration: none; font-weight: bold; padding: 8px 20px; border: 1px solid var(--gold); margin: 0 10px; transition: 0.3s; }
        .back-link:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>
    <div class="status-bar"><div class="dot"></div><span>UPLINK_STABLE_03.2026</span></div>
    <header>
        <h1>GOLDEN_AGE_1999</h1>
        <div style="font-size: 11px; margin-top: 10px; opacity: 0.7;">[ MEDIA_VAULT // MARCH_2026_MIRRORS ]</div>
    </header>
    <div class="section-title">UNBLOCKED_ANIME_MIRRORS</div>
    <div class="container" id="animeGrid"></div>
    <div class="section-title">UNBLOCKED_CINEMA_MIRRORS</div>
    <div class="container" id="movieGrid"></div>
    <div class="nav-footer">
        <a href="index.html" class="back-link">← HOME</a>
        <a href="#" onclick="checkPass()" class="back-link" style="border-color: #ff0033; color: #ff0033;">GO TO P3! [OVERRIDE]</a>
    </div>
    <script>
        const animeNodes = [
            { n: "HI_ANIME", u: "https://hianime.to" }, { n: "KAIDO_TV", u: "https://kaido.to" },
            { n: "ALLWISH", u: "https://allwish.to" }, { n: "ANIX_AC", u: "https://anix.ac" }
        ];
        const movieNodes = [
            { n: "NETWIX_XYZ", u: "https://netwix.xyz" }, { n: "SFLIX_TO", u: "https://sflix.to" },
            { n: "VUMOO_TO", u: "https://vumoo.to" }, { n: "FLIX_HQ", u: "https://flixhq.to" }
        ];
        function gen(id, list, prot) {
            const g = document.getElementById(id);
            for (let i = 1; i <= 16; i++) {
                const s = list[i % list.length];
                g.innerHTML += `<a href="${s.u}" target="_blank" class="button">${s.n}_V${i}<span class="desc">${prot} // NODE_${8000+i}</span></a>`;
            }
        }
        gen('animeGrid', animeNodes, '1999_PROTOCOL');
        gen('movieGrid', movieNodes, 'GOLDEN_VAULT');
        function checkPass() {
            const p = prompt("ENTER_OVERRIDE_CODE:");
            if (p === "V3N") window.location.href = "page3.html";
            else alert("ACCESS_DENIED");
        }
        window.addEventListener('keydown', e => { if(e.key.toLowerCase()==='q') window.location.replace('https://classroom.google.com'); });
    </script>
</body>
</html>
