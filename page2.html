<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emoji Hub | Media Vault</title>
    <style>
        :root { 
            --emoji-yellow: #ffcc00; 
            --bg: #ffffff; 
            --border: #e6b800;
        }
        
        body {
            background-color: var(--bg);
            color: #333;
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { 
            text-align: center; padding: 30px; width: 85%;
            background: var(--emoji-yellow); border-radius: 30px;
            border: 5px solid var(--border);
            margin-bottom: 30px; box-shadow: 0 10px 0 var(--border);
        }
        
        h1 { margin: 0; font-size: 35px; color: #000; }
        .gatekeep { font-size: 11px; color: #666; margin-top: 10px; font-weight: bold; font-style: italic; }

        .hub-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; width: 90%; max-width: 1200px;
        }
        
        .button { 
            height: 120px; border-radius: 25px; border: 4px solid var(--border);
            background: var(--bg); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: #000; font-weight: bold;
            box-shadow: 0 6px 0 var(--border);
        }
        
        .button:hover { 
            background: var(--emoji-yellow); transform: translateY(-5px); 
            box-shadow: 0 12px 0 var(--border); 
        }
        
        .emoji-icon { font-size: 35px; margin-bottom: 5px; }
        .desc { font-size: 10px; font-weight: normal; opacity: 0.7; margin-top: 5px; }

        .nav-footer { margin-top: 50px; display: flex; gap: 20px; }
        .page-link { 
            padding: 12px 30px; border-radius: 50px; border: 3px solid #000; 
            text-decoration: none; color: #000; font-weight: bold; 
            background: var(--emoji-yellow); transition: 0.2s;
        }
        .page-link:hover { background: #000; color: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>MEDIA_VAULT 🎥🍿</h1>
        <div class="gatekeep">btw gatekeep ts pls 🤫✨</div>
    </header>

    <div class="hub-container">
        <!-- ANIME & MOVIE NODES -->
        <a href="https://hianime.to" target="_blank" class="button">
            <div class="emoji-icon">🉐</div>
            <div>HI_ANIME</div>
            <span class="desc">Series & Movies</span>
        </a>
        <a href="https://sflix.to" target="_blank" class="button">
            <div class="emoji-icon">💎</div>
            <div>SFLIX</div>
            <span class="desc">Latest HD Cinema</span>
        </a>
        <a href="https://soap2day.rs" target="_blank" class="button">
            <div class="emoji-icon">🧼</div>
            <div>SOAP2DAY</div>
            <span class="desc">Streaming Mirror</span>
        </a>
        <a href="https://flixhq.to" target="_blank" class="button">
            <div class="emoji-icon">📺</div>
            <div>FLIX_HQ</div>
            <span class="desc">Multi-source TV</span>
        </a>
    </div>

    <div class="nav-footer">
        <a href="index.html" class="page-link">🏠 HOME</a>
        <a href="page3.html" class="page-link">🌙 GAMES</a>
    </div>

    <script>
        window.addEventListener('keydown', e => { 
            if(e.key.toLowerCase() === 'q') window.location.replace('https://classroom.google.com'); 
        });
    </script>
</body>
</html>
